<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Masterclass | Crown Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Daily.co Native Video SDK -->
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#080808',
                        brandCard: '#121212',
                        brandBorder: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        .metallic-gold-text {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .metallic-card-blue {
            background: linear-gradient(145deg, #161616 0%, #0d0d0d 100%);
            border: 1px solid rgba(37, 99, 235, 0.3);
            box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.15);
        }
        
        /* Forces the video iframe to fill its container beautifully */
        #video-container iframe {
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            border: none;
        }
    </style>
</head>
<body class="bg-brandDark text-gray-100 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="border-b border-gray-800/80 bg-brandDark/95 backdrop-blur-md shrink-0">
        <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div>
                    <span class="block text-[10px] uppercase tracking-widest metallic-gold-text font-bold">Live Environment</span>
                    <span class="text-lg font-black tracking-tight text-white drop-shadow">Carrier Attraction Masterclass</span>
                </div>
            </div>
            <div class="flex items-center space-x-6">
                <a href="portal.html" class="text-sm font-semibold text-gray-400 hover:text-white transition">&larr; Back to Dashboard</a>
            </div>
        </div>
    </header>

    <!-- Main Live Room Area -->
    <main class="flex-grow flex p-6 max-w-[1400px] mx-auto w-full gap-6">
        
        <!-- Left Side: Native Video Player -->
        <div class="flex-grow metallic-card-blue rounded-2xl flex flex-col overflow-hidden relative">
            <div id="video-container" class="w-full h-full bg-black relative z-10 flex items-center justify-center">
                <!-- Video will inject here automatically -->
                <p id="loading-video-text" class="text-gray-500 animate-pulse font-mono text-sm">Initializing Secure Stream...</p>
            </div>
        </div>

        <!-- Right Side: Class Resources / Notes (Optional sidebar) -->
        <div class="w-80 shrink-0 border border-gray-800 bg-[#121212] rounded-2xl p-6 flex flex-col hidden lg:flex">
            <h3 class="text-white font-bold text-lg mb-4 border-b border-gray-800 pb-2">Session Resources</h3>
            <ul class="space-y-4 text-sm text-gray-400">
                <li class="flex items-start space-x-3">
                    <span class="text-blue-500">📄</span>
                    <a href="#" class="hover:text-blue-400 transition">Carrier Pitch Script PDF</a>
                </li>
                <li class="flex items-start space-x-3">
                    <span class="text-blue-500">📊</span>
                    <a href="#" class="hover:text-blue-400 transition">Market Rate Calculator</a>
                </li>
                <li class="flex items-start space-x-3">
                    <span class="text-blue-500">📝</span>
                    <a href="#" class="hover:text-blue-400 transition">Compliance Checklist</a>
                </li>
            </ul>
        </div>
    </main>

    <!-- Security & Video Scripts -->
    <script>
        const SUPABASE_URL = 'https://thzbqlumohwlxgbodopf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KmHtN8HHbMOg6P0HetqaFw_uYgz8NN8';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            // 1. Check if user is allowed to be here
            const { data, error } = await supabaseClient.auth.getSession();
            if (error || !data.session) {
                window.location.replace('login.html');
                return;
            }

            // 2. Initialize the Native Video Player
            // REPLACE THIS URL with your free Daily.co room URL later
            const ROOM_URL = 'https://your-domain.daily.co/crown-access-live'; 

            const videoContainer = document.getElementById('video-container');
            const loadingText = document.getElementById('loading-video-text');

            try {
                const callFrame = window.DailyIframe.createFrame(videoContainer, {
                    iframeStyle: {
                        width: '100%',
                        height: '100%',
                        border: '0',
                        borderRadius: '16px'
                    },
                    showLeaveButton: true,
                    theme: {
                        colors: {
                            accent: '#2563eb', // Matches your blue theme
                            accentText: '#ffffff',
                            background: '#000000', // Matches dark theme
                            backgroundAccent: '#121212',
                            baseText: '#ffffff',
                            border: '#222222',
                        }
                    }
                });

                await callFrame.join({ url: ROOM_URL });
                loadingText.style.display = 'none'; // Hide loading text once connected

            } catch (err) {
                console.error("Video failed to load:", err);
                loadingText.textContent = "Error loading live stream. Please refresh.";
                loadingText.classList.remove('animate-pulse');
                loadingText.classList.add('text-red-500');
            }
        };
    </script>
</body>
</html>
